<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-main: #f4f6f9;
            --bg-card: #ffffff;
            --card-border: #e2e8f0;
            --accent-primary: #4f46e5;
            --accent-hover: #4338ca;
            --btn-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --btn-hover: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --text-label: #334155;
            --input-bg: #f8fafc;
            --input-border: #cbd5e1;
            --input-focus-border: #4f46e5;
            --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --success-bg: #f0fdf4;
            --success-border: #bbf7d0;
            --success-text: #166534;
            --danger-bg: #fef2f2;
            --danger-border: #fecaca;
            --danger-text: #991b1b;
            --warning-bg: #fffbeb;
            --warning-border: #fde68a;
            --warning-text: #92400e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--card-shadow);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.4rem;
            color: var(--accent-primary);
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 1.5rem;
            }

            .btn-submit,
            .form-group-full {
                grid-column: span 1 !important;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group-full {
            grid-column: span 2;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-label);
        }

        .form-control,
        select {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-size: 0.9rem;
            transition: all 0.25s ease;
            width: 100%;
            outline: none;
        }

        .form-control:focus,
        select:focus {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background: #fff;
        }

        select option {
            background-color: #fff;
            color: var(--text-main);
        }

        .btn-submit {
            grid-column: span 2;
            background: var(--btn-gradient);
            border: none;
            border-radius: 10px;
            padding: 0.9rem;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .btn-submit:hover {
            background: var(--btn-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(79, 70, 229, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .result-container {
            margin-top: 2rem;
            padding: 1.25rem;
            border-radius: 12px;
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            animation: slideUp 0.4s ease forwards;
        }

        .result-disease {
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            color: var(--danger-text);
        }

        .result-healthy {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success-text);
        }

        .result-error {
            background: var(--warning-bg);
            border: 1px solid var(--warning-border);
            color: var(--warning-text);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>HEART DISEASE PREDICTION</h1>

        <form action="{{ url_for('predict_datapoint')}}" method="post">
            <div class="form-grid">

                <div class="form-group">
                    <label for="age">Age (Years)</label>
                    <input class="form-control" type="number" id="age" name="age" placeholder="e.g. 54" min="1"
                        max="120" required />
                </div>

                <div class="form-group">
                    <label for="sex">Sex</label>
                    <select id="sex" name="sex" required>
                        <option value="" selected disabled>Select Sex</option>
                        <option value="1">Male (1)</option>
                        <option value="0">Female (0)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cp">Chest Pain Type</label>
                    <select id="cp" name="cp" required>
                        <option value="" selected disabled>Select chest pain type</option>
                        <option value="0">Typical Angina (0)</option>
                        <option value="1">Atypical Angina (1)</option>
                        <option value="2">Non-anginal Pain (2)</option>
                        <option value="3">Asymptomatic (3)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="trestbps">Resting Blood Pressure (mm Hg)</label>
                    <input class="form-control" type="number" id="trestbps" name="trestbps" placeholder="e.g. 130"
                        min="50" max="250" required />
                </div>

                <div class="form-group">
                    <label for="chol">Serum Cholesterol (mg/dl)</label>
                    <input class="form-control" type="number" id="chol" name="chol" placeholder="e.g. 240" min="50"
                        max="600" required />
                </div>

                <div class="form-group">
                    <label for="fbs">Fasting Blood Sugar > 120 mg/dl</label>
                    <select id="fbs" name="fbs" required>
                        <option value="" selected disabled>Select</option>
                        <option value="1">Yes (1)</option>
                        <option value="0">No (0)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="restecg">Resting ECG Results</label>
                    <select id="restecg" name="restecg" required>
                        <option value="" selected disabled>Select ECG result</option>
                        <option value="0">Normal (0)</option>
                        <option value="1">ST-T Wave Abnormality (1)</option>
                        <option value="2">Left Ventricular Hypertrophy (2)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="thalach">Maximum Heart Rate Achieved</label>
                    <input class="form-control" type="number" id="thalach" name="thalach" placeholder="e.g. 150"
                        min="60" max="250" required />
                </div>

                <div class="form-group">
                    <label for="exang">Exercise Induced Angina</label>
                    <select id="exang" name="exang" required>
                        <option value="" selected disabled>Select</option>
                        <option value="1">Yes (1)</option>
                        <option value="0">No (0)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="oldpeak">ST Depression (Oldpeak)</label>
                    <input class="form-control" type="number" step="0.1" id="oldpeak" name="oldpeak"
                        placeholder="e.g. 1.0" min="0.0" max="10.0" required />
                </div>

                <div class="form-group">
                    <label for="slope">Slope of Peak Exercise ST Segment</label>
                    <select id="slope" name="slope" required>
                        <option value="" selected disabled>Select slope</option>
                        <option value="0">Upsloping (0)</option>
                        <option value="1">Flat (1)</option>
                        <option value="2">Downsloping (2)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ca">Major Vessels Colored by Fluoroscopy</label>
                    <select id="ca" name="ca" required>
                        <option value="" selected disabled>Select count</option>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>

                <div class="form-group form-group-full">
                    <label for="thal">Thalassemia</label>
                    <select id="thal" name="thal" required>
                        <option value="" selected disabled>Select thal status</option>
                        <option value="1">Normal (1)</option>
                        <option value="2">Fixed Defect (2)</option>
                        <option value="3">Reversible Defect (3)</option>
                        <option value="0">Unknown / Other (0)</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Predict Heart Disease Risk</button>
            </div>
        </form>

        {% if results %}
        <div class="result-container {{ result_class }}">
            {{ results }}
        </div>
        {% endif %}
    </div>
</body>

</html>
